<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ป้ายไฟ LED</title>
<style>
  :root{
    --bg-deep:#07070d;
    --panel:#101018;
    --panel-line:#23232f;
    --neon-pink:#ff2fb8;
    --neon-cyan:#2ff2ff;
    --neon-amber:#ffb020;
    --neon-lime:#a6ff2f;
    --text-dim:#8d8da3;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:var(--bg-deep);
    font-family:'Segoe UI', 'Noto Sans Thai', sans-serif;
    touch-action:none;
    overscroll-behavior:none;
  }
  body.locked{
    touch-action:none;
  }
 
  #stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(ellipse at center, #10101a 0%, #05050a 75%);
    overflow:hidden;
  }
 
  /* dot-matrix board texture */
  #stage::before{
    content:"";
    position:absolute;
    inset:0;
    background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events:none;
    z-index:1;
  }
 
  #glowLayer{
    position:absolute;
    inset:0;
    pointer-events:none;
    mix-blend-mode:screen;
    opacity:0;
    transition:opacity .3s ease;
    z-index:1;
  }
  #glowLayer.active{opacity:1;}
  .beam{
    position:absolute;
    width:60vmax;
    height:60vmax;
    border-radius:50%;
    filter:blur(80px);
    opacity:.35;
    transition:background .4s ease;
  }
  .beam1{background:var(--neon-pink); top:-20%; left:-10%;}
  .beam2{background:var(--neon-cyan); bottom:-25%; right:-10%;}
  .beam3{background:var(--neon-amber); top:30%; right:20%;}
 
  /* ===== Border chase bulbs ===== */
  #bulbLayer{
    position:absolute;
    inset:10px;
    pointer-events:none;
    z-index:5;
    opacity:0;
    transition:opacity .3s ease;
  }
  #bulbLayer.active{opacity:1;}
  .bulbRow{
    position:absolute;
    left:0; right:0;
    display:flex;
    justify-content:space-between;
    padding:0 6px;
  }
  .bulbRow.top{top:0;}
  .bulbRow.bottom{bottom:0;}
  .bulb{
    width:7px;
    height:7px;
    border-radius:50%;
    background:radial-gradient(circle, #fff6d0, #ffb020);
    box-shadow:0 0 6px #ffb020, 0 0 12px #ffb020;
    animation:bulbBlink 1s infinite steps(1);
  }
  .bulb.odd{animation-delay:.5s;}
  @keyframes bulbBlink{
    0%,49%{opacity:1;}
    50%,100%{opacity:.15; box-shadow:0 0 2px #ffb020;}
  }
 
  /* ===== Sparkle burst ===== */
  #sparkleLayer{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:6;
    overflow:hidden;
  }
  .sparkle{
    position:absolute;
    font-size:18px;
    opacity:0;
    animation:sparklePop 900ms ease-out forwards;
    filter:drop-shadow(0 0 6px currentColor);
  }
  @keyframes sparklePop{
    0%{opacity:0; transform:scale(.2) translateY(0) rotate(0deg);}
    15%{opacity:1; transform:scale(1) translateY(-6px) rotate(20deg);}
    100%{opacity:0; transform:scale(.6) translateY(-70px) rotate(140deg);}
  }
 
  #marqueeTrack{
    width:100%;
    overflow:hidden;
    position:relative;
    z-index:2;
    display:flex;
    align-items:center;
    height:1.4em;
  }
  #signText{
    position:relative;
    display:flex;
    white-space:nowrap;
    will-change:transform;
  }
  .signCopy{
    font-weight:800;
    letter-spacing:0.02em;
    font-family:'Arial Black','Noto Sans Thai',sans-serif;
    color:#ff2fb8;
    text-shadow:
      0 0 6px currentColor,
      0 0 18px currentColor,
      0 0 40px currentColor,
      0 0 80px currentColor;
    padding-right:80px;
    user-select:none;
    -webkit-user-select:none;
  }
  .signCopy.rainbow{
    background:linear-gradient(90deg,var(--neon-pink),var(--neon-amber),var(--neon-cyan),var(--neon-lime),var(--neon-pink));
    background-size:300% 100%;
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    -webkit-text-fill-color:transparent;
    text-shadow:none;
    filter:drop-shadow(0 0 14px rgba(255,255,255,.35));
    animation:rainbowShift 3s linear infinite;
  }
  @keyframes rainbowShift{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
  }
 
  /* ===== Control Dock ===== */
  #dock{
    position:fixed;
    left:0; right:0; bottom:0;
    z-index:10;
    display:flex;
    justify-content:center;
    padding:14px 10px calc(14px + env(safe-area-inset-bottom));
    transition:transform .35s ease, opacity .35s ease;
  }
  #dock.hidden{
    transform:translateY(120%);
    opacity:0;
    pointer-events:none;
  }
  #panel{
    width:100%;
    max-width:760px;
    max-height:70vh;
    overflow-y:auto;
    background:linear-gradient(180deg, var(--panel), #0b0b12);
    border:1px solid var(--panel-line);
    border-radius:18px;
    padding:14px 16px 12px;
    box-shadow:0 10px 40px rgba(0,0,0,.6);
    color:#e8e8f0;
  }
  #textRow{
    display:flex;
    gap:8px;
    margin-bottom:10px;
  }
  #textInput{
    flex:1;
    min-width:0;
    background:#05050a;
    border:1px solid var(--panel-line);
    color:#fff;
    padding:10px 12px;
    border-radius:10px;
    font-size:15px;
    outline:none;
  }
  #textInput:focus{border-color:var(--neon-cyan);}
 
  .ctrlGrid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(140px,1fr));
    gap:10px;
    margin-bottom:10px;
  }
  .ctrl label{
    display:block;
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:4px;
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  select, input[type=range], input[type=color]{
    width:100%;
    background:#05050a;
    border:1px solid var(--panel-line);
    color:#fff;
    border-radius:8px;
    padding:6px 8px;
    font-size:13px;
  }
  input[type=color]{
    padding:2px;
    height:32px;
    cursor:pointer;
  }
  input[type=range]{
    padding:0;
    accent-color:var(--neon-cyan);
  }
 
  #presetRow{
    margin-bottom:10px;
  }
  #presetRow label{
    display:block;
    font-size:11px;
    color:var(--text-dim);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:.06em;
  }
  #presetBtns{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .themeBtn{
    border:1px solid var(--panel-line);
    background:#15151f;
    color:#fff;
    padding:8px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
    transition:transform .15s ease;
  }
  .themeBtn:active{transform:scale(.94);}
 
  #actionRow{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .btn{
    flex:1;
    min-width:90px;
    border:1px solid var(--panel-line);
    background:#15151f;
    color:#fff;
    padding:11px 10px;
    border-radius:10px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    transition:transform .15s ease, background .2s ease, box-shadow .2s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.96);}
  .btn.on{
    background:var(--neon-cyan);
    color:#05050a;
    box-shadow:0 0 16px var(--neon-cyan);
  }
  .btn.discoOn{
    background:linear-gradient(90deg,var(--neon-pink),var(--neon-amber),var(--neon-cyan),var(--neon-lime));
    background-size:300% 100%;
    animation:discoBtn 2s linear infinite;
    color:#05050a;
  }
  @keyframes discoBtn{
    0%{background-position:0% 50%;}
    100%{background-position:300% 50%;}
  }
 
  /* Lock overlay + unlock fab */
  #unlockFab{
    position:fixed;
    z-index:20;
    right:16px;
    bottom:16px;
    width:52px;
    height:52px;
    border-radius:50%;
    background:#15151f;
    border:1px solid var(--panel-line);
    color:#fff;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:20px;
    box-shadow:0 6px 20px rgba(0,0,0,.5);
    cursor:pointer;
  }
  #unlockFab.show{display:flex;}
  #unlockFab:active{transform:scale(.92);}
 
  ::selection{background:transparent;}
</style>
</head>
<body>
 
<div id="stage">
  <div id="glowLayer">
    <div class="beam beam1"></div>
    <div class="beam beam2"></div>
    <div class="beam beam3"></div>
  </div>
  <div id="bulbLayer">
    <div class="bulbRow top" id="bulbTop"></div>
    <div class="bulbRow bottom" id="bulbBottom"></div>
  </div>
  <div id="sparkleLayer"></div>
  <div id="marqueeTrack">
    <div id="signText">
      <span class="signCopy" id="copyA">ยินดีต้อนรับ WELCOME</span><span class="signCopy" id="copyB">ยินดีต้อนรับ WELCOME</span>
    </div>
  </div>
</div>
 
<button id="unlockFab" title="ปลดล็อก">🔒</button>
 
<div id="dock">
  <div id="panel">
    <div id="textRow">
      <input id="textInput" type="text" maxlength="200" value="ยินดีต้อนรับ WELCOME" placeholder="พิมพ์ข้อความป้ายไฟ...">
    </div>
 
    <div class="ctrlGrid">
      <div class="ctrl">
        <label>ฟอนต์</label>
        <select id="fontSelect">
          <option value="'Arial Black','Noto Sans Thai',sans-serif">Arial Black</option>
          <option value="'Courier New', monospace">Courier (LED)</option>
          <option value="'Georgia', serif">Georgia</option>
          <option value="'Comic Sans MS', cursive">Comic Sans</option>
          <option value="'Impact', sans-serif">Impact</option>
          <option value="'Trebuchet MS', sans-serif">Trebuchet</option>
          <option value="'Noto Sans Thai', sans-serif">Noto Sans Thai</option>
        </select>
      </div>
      <div class="ctrl">
        <label>สีตัวอักษร</label>
        <input id="colorPicker" type="color" value="#ff2fb8">
      </div>
      <div class="ctrl">
        <label>ขนาดตัวอักษร: <span id="sizeVal">64</span>px</label>
        <input id="sizeSlider" type="range" min="20" max="200" value="64">
      </div>
      <div class="ctrl">
        <label>ความเร็วเลื่อน: <span id="speedVal">12</span>s</label>
        <input id="speedSlider" type="range" min="2" max="30" value="12">
      </div>
    </div>
 
    <div id="presetRow">
      <label>ธีมสำเร็จรูป</label>
      <div id="presetBtns"></div>
    </div>
 
    <div id="actionRow">
      <button class="btn" id="scrollToggleBtn">⏸ หยุดเลื่อน</button>
      <button class="btn" id="discoBtn">🪩 ไฟดิสโก้</button>
      <button class="btn" id="rainbowBtn">🌈 สายรุ้ง</button>
      <button class="btn" id="bulbBtn">💡 ไฟกระพริบขอบ</button>
      <button class="btn" id="sparkleBtn">🎆 พ่นประกาย</button>
      <button class="btn" id="fullscreenBtn">⛶ เต็มจอ</button>
      <button class="btn" id="lockBtn">🔒 ล็อกหน้าจอ</button>
    </div>
  </div>
</div>
 
<script>
(function(){
  const textInput = document.getElementById('textInput');
  const signText = document.getElementById('signText');
  const copyA = document.getElementById('copyA');
  const copyB = document.getElementById('copyB');
  const fontSelect = document.getElementById('fontSelect');
  const colorPicker = document.getElementById('colorPicker');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeVal = document.getElementById('sizeVal');
  const speedSlider = document.getElementById('speedSlider');
  const speedVal = document.getElementById('speedVal');
  const scrollToggleBtn = document.getElementById('scrollToggleBtn');
  const discoBtn = document.getElementById('discoBtn');
  const rainbowBtn = document.getElementById('rainbowBtn');
  const bulbBtn = document.getElementById('bulbBtn');
  const sparkleBtn = document.getElementById('sparkleBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const lockBtn = document.getElementById('lockBtn');
  const dock = document.getElementById('dock');
  const unlockFab = document.getElementById('unlockFab');
  const glowLayer = document.getElementById('glowLayer');
  const bulbLayer = document.getElementById('bulbLayer');
  const bulbTop = document.getElementById('bulbTop');
  const bulbBottom = document.getElementById('bulbBottom');
  const sparkleLayer = document.getElementById('sparkleLayer');
  const stage = document.getElementById('stage');
  const presetBtns = document.getElementById('presetBtns');
 
  const neonPalette = ['#ff2fb8','#2ff2ff','#ffb020','#a6ff2f','#ff4d4d','#c04dff','#4dffb0'];
  const sparkleGlyphs = ['✦','✧','★','✨','●'];
 
  const themes = [
    {name:'นีออนซิตี้', color:'#ff2fb8', beams:['#ff2fb8','#2ff2ff','#ffb020']},
    {name:'เมทริกซ์เขียว', color:'#39ff14', beams:['#39ff14','#0aff9d','#0d5c2f']},
    {name:'คริสต์มาส', color:'#ff3b3b', beams:['#ff3b3b','#2ecc71','#ffd700']},
    {name:'วินเทจไดเนอร์', color:'#ffcc00', beams:['#ff6f00','#ffcc00','#ff3d3d']},
    {name:'อวกาศ', color:'#8a2be2', beams:['#8a2be2','#2ff2ff','#ff2fb8']}
  ];
 
  const beamEls = [
    document.querySelector('.beam1'),
    document.querySelector('.beam2'),
    document.querySelector('.beam3')
  ];
 
  let scrolling = true;
  let discoOn = false;
  let rainbowOn = false;
  let bulbsOn = false;
  let discoTimer = null;
  let locked = false;
 
  let copyWidth = 0;
  let position = 0;
  let lastTime = null;
  let rafId = null;
 
  /* ---------- persistence ---------- */
  const STORAGE_KEY = 'ledSignState_v1';
  function saveState(){
    try{
      const state = {
        text: textInput.value,
        font: fontSelect.value,
        color: colorPicker.value,
        size: sizeSlider.value,
        speed: speedSlider.value,
        scrolling: scrolling,
        bulbsOn: bulbsOn,
        rainbowOn: rainbowOn
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){}
  }
  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return null;
      return JSON.parse(raw);
    }catch(e){ return null; }
  }
 
  /* ---------- text & measuring ---------- */
  function updateText(){
    const val = textInput.value.trim() || 'ป้ายไฟ LED';
    copyA.textContent = val;
    copyB.textContent = val;
    measure();
  }
  function measure(){
    const w = copyA.getBoundingClientRect().width;
    if(w > 0){
      copyWidth = w;
      if(position <= -copyWidth) position = position % copyWidth;
    }
  }
  textInput.addEventListener('input', ()=>{ updateText(); saveState(); });
 
  fontSelect.addEventListener('change', ()=>{
    signText.style.fontFamily = fontSelect.value;
    requestAnimationFrame(measure);
    saveState();
  });
 
  colorPicker.addEventListener('input', ()=>{
    if(!discoOn && !rainbowOn){
      copyA.style.color = colorPicker.value;
      copyB.style.color = colorPicker.value;
    }
    saveState();
  });
 
  sizeSlider.addEventListener('input', ()=>{
    sizeVal.textContent = sizeSlider.value;
    signText.style.fontSize = sizeSlider.value + 'px';
    requestAnimationFrame(measure);
    saveState();
  });
 
  speedSlider.addEventListener('input', ()=>{
    speedVal.textContent = speedSlider.value;
    // speed only changes how fast pxPerSec is computed each frame -
    // position is untouched, so the motion continues smoothly with no jump/reset
    saveState();
  });
 
  /* ---------- smooth seamless scroll loop ---------- */
  function frame(ts){
    if(lastTime === null) lastTime = ts;
    let dt = (ts - lastTime) / 1000;
    if(dt > 0.05) dt = 0.05; // guard against tab-switch jumps
    lastTime = ts;
 
    if(scrolling && copyWidth > 0){
      const speedSeconds = parseFloat(speedSlider.value) || 12;
      const pxPerSec = copyWidth / speedSeconds;
      position -= pxPerSec * dt;
      if(position <= -copyWidth){
        position += copyWidth; // seamless wrap: second copy is identical, so no visible reset
      }
      signText.style.transform = 'translateX(' + position + 'px)';
    }
    rafId = requestAnimationFrame(frame);
  }
 
  scrollToggleBtn.addEventListener('click', ()=>{
    scrolling = !scrolling;
    lastTime = null; // avoid a big dt jump right after resuming
    scrollToggleBtn.textContent = scrolling ? '⏸ หยุดเลื่อน' : '▶ เลื่อนข้อความ';
    scrollToggleBtn.classList.toggle('on', !scrolling);
    saveState();
  });
 
  /* ---------- disco ---------- */
  function startDisco(){
    glowLayer.classList.add('active');
    discoBtn.classList.add('discoOn');
    let i = 0;
    discoTimer = setInterval(()=>{
      i = (i+1) % neonPalette.length;
      if(!rainbowOn){
        copyA.style.color = neonPalette[i];
        copyB.style.color = neonPalette[i];
      }
      beamEls.forEach((b, idx)=>{
        b.style.background = neonPalette[(i+idx+1) % neonPalette.length];
      });
    }, 400);
  }
  function stopDisco(){
    clearInterval(discoTimer);
    glowLayer.classList.remove('active');
    discoBtn.classList.remove('discoOn');
    if(!rainbowOn){
      copyA.style.color = colorPicker.value;
      copyB.style.color = colorPicker.value;
    }
  }
  discoBtn.addEventListener('click', ()=>{
    discoOn = !discoOn;
    if(discoOn) startDisco(); else stopDisco();
  });
 
  /* ---------- rainbow gradient text ---------- */
  function applyRainbow(){
    copyA.classList.toggle('rainbow', rainbowOn);
    copyB.classList.toggle('rainbow', rainbowOn);
    if(!rainbowOn){
      copyA.style.color = colorPicker.value;
      copyB.style.color = colorPicker.value;
    }
  }
  rainbowBtn.addEventListener('click', ()=>{
    rainbowOn = !rainbowOn;
    rainbowBtn.classList.toggle('on', rainbowOn);
    applyRainbow();
    saveState();
  });
 
  /* ---------- border chase bulbs ---------- */
  function buildBulbs(){
    const count = 26;
    bulbTop.innerHTML = '';
    bulbBottom.innerHTML = '';
    for(let i=0;i<count;i++){
      const b1 = document.createElement('div');
      b1.className = 'bulb' + (i % 2 ? ' odd' : '');
      bulbTop.appendChild(b1);
      const b2 = document.createElement('div');
      b2.className = 'bulb' + (i % 2 ? '' : ' odd');
      bulbBottom.appendChild(b2);
    }
  }
  buildBulbs();
  bulbBtn.addEventListener('click', ()=>{
    bulbsOn = !bulbsOn;
    bulbLayer.classList.toggle('active', bulbsOn);
    bulbBtn.classList.toggle('on', bulbsOn);
    saveState();
  });
 
  /* ---------- sparkle burst ---------- */
  function spawnSparkles(count){
    const rect = stage.getBoundingClientRect();
    for(let i=0;i<count;i++){
      const s = document.createElement('div');
      s.className = 'sparkle';
      s.textContent = sparkleGlyphs[Math.floor(Math.random()*sparkleGlyphs.length)];
      s.style.color = neonPalette[Math.floor(Math.random()*neonPalette.length)];
      s.style.left = (Math.random()*rect.width) + 'px';
      s.style.top = (Math.random()*rect.height) + 'px';
      s.style.animationDuration = (600 + Math.random()*500) + 'ms';
      sparkleLayer.appendChild(s);
      s.addEventListener('animationend', ()=> s.remove());
    }
  }
  sparkleBtn.addEventListener('click', ()=> spawnSparkles(28));
 
  /* ---------- presets ---------- */
  function applyTheme(theme){
    colorPicker.value = theme.color;
    if(!discoOn && !rainbowOn){
      copyA.style.color = theme.color;
      copyB.style.color = theme.color;
    }
    beamEls.forEach((b, idx)=>{ b.style.background = theme.beams[idx % theme.beams.length]; });
    saveState();
  }
  themes.forEach(theme=>{
    const btn = document.createElement('button');
    btn.className = 'themeBtn';
    btn.textContent = theme.name;
    btn.addEventListener('click', ()=> applyTheme(theme));
    presetBtns.appendChild(btn);
  });
 
  /* ---------- fullscreen ---------- */
  fullscreenBtn.addEventListener('click', ()=>{
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen().catch(()=>{});
    } else {
      document.exitFullscreen().catch(()=>{});
    }
  });
  document.addEventListener('fullscreenchange', ()=>{
    fullscreenBtn.classList.toggle('on', !!document.fullscreenElement);
    requestAnimationFrame(measure);
  });
 
  /* ---------- lock / unlock ---------- */
  function lockScreen(){
    locked = true;
    dock.classList.add('hidden');
    unlockFab.classList.add('show');
    document.body.classList.add('locked');
  }
  function unlockScreen(){
    locked = false;
    dock.classList.remove('hidden');
    unlockFab.classList.remove('show');
    document.body.classList.remove('locked');
  }
  lockBtn.addEventListener('click', lockScreen);
  unlockFab.addEventListener('click', unlockScreen);
 
  // Prevent scroll/zoom gestures on the stage while allowing normal control interaction
  stage.addEventListener('touchmove', (e)=>{
    e.preventDefault();
  }, {passive:false});
 
  document.addEventListener('gesturestart', (e)=> e.preventDefault());
 
  window.addEventListener('resize', ()=> requestAnimationFrame(measure));
 
  /* ---------- init ---------- */
  function init(){
    const saved = loadState();
    if(saved){
      if(typeof saved.text === 'string') textInput.value = saved.text;
      if(saved.font){ fontSelect.value = saved.font; signText.style.fontFamily = saved.font; }
      if(saved.color) colorPicker.value = saved.color;
      if(saved.size){ sizeSlider.value = saved.size; sizeVal.textContent = saved.size; signText.style.fontSize = saved.size + 'px'; }
      if(saved.speed){ speedSlider.value = saved.speed; speedVal.textContent = saved.speed; }
      if(typeof saved.scrolling === 'boolean'){
        scrolling = saved.scrolling;
        scrollToggleBtn.textContent = scrolling ? '⏸ หยุดเลื่อน' : '▶ เลื่อนข้อความ';
        scrollToggleBtn.classList.toggle('on', !scrolling);
      }
      if(saved.bulbsOn){
        bulbsOn = true;
        bulbLayer.classList.add('active');
        bulbBtn.classList.add('on');
      }
      if(saved.rainbowOn){
        rainbowOn = true;
        rainbowBtn.classList.add('on');
      }
    }
    updateText();
    copyA.style.color = rainbowOn ? copyA.style.color : colorPicker.value;
    copyB.style.color = rainbowOn ? copyB.style.color : colorPicker.value;
    applyRainbow();
 
    // start swept-in from the right edge, like a marquee entrance
    position = stage.getBoundingClientRect().width;
    signText.style.transform = 'translateX(' + position + 'px)';
 
    rafId = requestAnimationFrame(frame);
  }
  init();
})();
</script>
</body>
</html>
